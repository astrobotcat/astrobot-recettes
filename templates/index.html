<!DOCTYPE html>
<html>
<head>
    <title>🍳 Mes Recettes Perso</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <button class="toggle-dark-mode" onclick="toggleDarkMode()">🌓 Activer le thème sombre</button>
    
    <h1>🍳 Mes Recettes Perso</h1>
    
    <input type="text" id="search" class="search-box" placeholder="Rechercher une recette..." onkeyup="searchRecipes()">
    <input type="text" id="ingredient-search" class="search-box" placeholder="Rechercher par ingrédient (ex: tomate, pâtes)..." onkeyup="searchByIngredient()">
    
    <div id="recipes-list">
        {% for recipe in recipes %}
        <div class="recipe-card" data-ingredients="{{ recipe.ingredients|join(',') }}">
            <h2><a href="/recipe/{{ recipe.filename }}">{{ recipe.title }}</a></h2>
            <div>{{ recipe.html|safe }}</div>
        </div>
        {% endfor %}
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }
        
        function searchRecipes() {
            const input = document.getElementById("search");
            const filter = input.value.toLowerCase();
            const cards = document.getElementsByClassName("recipe-card");
            
            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].getElementsByTagName("h2")[0].textContent.toLowerCase();
                if (title.includes(filter)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
        
        function searchByIngredient() {
            const input = document.getElementById("ingredient-search");
            const filter = input.value.toLowerCase();
            const cards = document.getElementsByClassName("recipe-card");
            
            for (let i = 0; i < cards.length; i++) {
                const ingredients = cards[i].dataset.ingredients.toLowerCase();
                if (ingredients.includes(filter)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
